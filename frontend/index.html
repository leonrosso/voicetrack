<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>voicetrack-pwa</title>
    <script>
      // Altezza stabile PWA: 100dvh su Android standalone cambia tra cold start e refresh.
      // Con data-vt-lock-app-height (pannello edit) non seguire la tastiera; orientation sì.
      (function () {
        function setAppHeight(force) {
          if (!force && document.documentElement.getAttribute('data-vt-lock-app-height') === '1') return;
          var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
          document.documentElement.style.setProperty('--app-height', Math.round(h) + 'px');
        }
        setAppHeight(true);
        window.addEventListener('resize', function () { setAppHeight(false); });
        window.addEventListener('orientationchange', function () { setAppHeight(true); });
        window.addEventListener('pageshow', function () { setAppHeight(true); });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', function () { setAppHeight(false); });
          window.visualViewport.addEventListener('scroll', function () { setAppHeight(false); });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
